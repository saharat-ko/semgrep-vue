name: Semgrep Vue3 Version Scanner

on:
  workflow_dispatch:

jobs:
  semgrep-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout your project repo
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Python deps
        run: pip install glob2

      - name: Make script executable
        run: chmod +x scripts/scan_versions.sh

      - name: Run Semgrep on all Vue3 versions
        run: bash scripts/scan_versions.sh

      - name: Generate CSV + HTML Report
        run: python scripts/generate_report.py

      - name: Upload all results as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: results/

      - name: Show Summary in Job log
        run: python scripts/generate_report.py